services:
  - type: web
    name: myfabric-api
    env: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false   # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this in Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel/Netlify URL
